name: Electron Rolling Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  build-electron:
    name: Build Electron (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            builder_args: --linux
          - name: windows-x64
            os: windows-latest
            builder_args: --win
          - name: macos-arm64
            os: macos-14
            builder_args: --mac --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml', 'frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Build Electron package
        run: pnpm run build:electron ${{ matrix.builder_args }}
        env:
          SKIP_FRONTEND_BUILD: '1'

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.name }}
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.zip
            dist-electron/*.yml
            dist-electron/*.blockmap
          retention-days: 7

  release-main:
    name: Publish rolling main release
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Electron artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: release-assets
          merge-multiple: true

      - name: Delete previous rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete main --cleanup-tag -y || true

      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main
          name: Rolling Release (main)
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/*
